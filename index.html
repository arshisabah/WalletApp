<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Wallet</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <!-- ================= HEADER ================= -->

    <header class="header">
      <div class="container">
        <div class="logo">
          <i class="fa-solid fa-wallet"></i>
          <h1>Digital Wallet</h1>
        </div>

        <nav class="navbar">
          <ul>
            <li><a href="#">Dashboard</a></li>

            <li><a href="#">Transactions</a></li>

            <li><a href="#">Profile</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">
      <!-- Dashboard -->

      <section class="dashboard">
        <article class="card">
          <h3>Current Balance</h3>

          <h2 id="balance">₹0</h2>
        </article>

        <article class="card">
          <h3>Total Credit</h3>

          <h2 id="credit">₹0</h2>
        </article>

        <article class="card">
          <h3>Total Debit</h3>

          <h2 id="debit">₹0</h2>
        </article>

        <article class="card">
          <h3>Total Transactions</h3>

          <h2 id="transactionCount">0</h2>
        </article>
      </section>

      <!-- ================= Forms ================= -->

      <section class="actions">
        <!-- Add Money -->

        <article class="form-card">
          <h2>Add Money</h2>

          <form id="addMoneyForm">
            <div class="form-group">
              <label for="addAmount"> Amount </label>

              <input
                type="number"
                id="addAmount"
                placeholder="Enter Amount"
                min="1"
                required
              />
            </div>

            <button id="addMoneyBtn" type="submit">
              <i class="fa-solid fa-plus"></i>

              Add Money
            </button>
          </form>
        </article>

        <!-- Send Money -->

        <article class="form-card">
          <h2>Send Money</h2>

          <form id="sendMoneyForm">
            <div class="form-group">
              <label for="receiver"> Receiver Name </label>

              <input
                type="text"
                id="receiver"
                placeholder="Receiver Name"
                required
              />
            </div>

            <div class="form-group">
              <label for="sendAmount"> Amount </label>

              <input
                type="number"
                id="sendAmount"
                placeholder="Enter Amount"
                min="1"
                required
              />
            </div>

            <div class="form-group">
              <label for="purpose"> Purpose </label>

              <select id="purpose" required></select>
            </div>

            <button id="sendMoneyBtn" type="submit">
              <i class="fa-solid fa-paper-plane"></i>

              Send Money
            </button>
          </form>
        </article>
      </section>

      <!-- ================= Controls ================= -->

      <section class="controls">
        <div class="search-box">
          <label for="search"> Search </label>

          <input type="text" id="search" placeholder="Search by Receiver" />
        </div>

        <div class="filter-box">
          <label for="filter"> Filter </label>

          <select id="filter"></select>
        </div>

        <div class="sort-box">
          <label for="sort"> Sort By </label>

          <select id="sort"></select>
        </div>
      </section>

      <!-- ================= History ================= -->

      <section class="history">
        <div class="table-header">
          <h2>Transaction History</h2>
        </div>

        <table>
          <thead>
            <tr>
              <th>Date</th>

              <th>Receiver</th>

              <th>Purpose</th>

              <th>Type</th>

              <th>Amount</th>

              <th>Status</th>

              <th>Action</th>
            </tr>
          </thead>

          <tbody id="transactionBody"></tbody>
        </table>
      </section>
    </main>

    <!-- ================= Footer ================= -->

    <footer class="footer">
      <p>
        © 2026 Digital Wallet

        <span>|</span>

        Built using HTML, CSS & Vanilla JavaScript
      </p>
    </footer>

    <!-- ================= JavaScript ================= -->

    <script src="./js/constants.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/validation.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
